<!DOCTYPE html>
<html>

<head>
  <title>Centered Elements with Navbar</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <style>
    /* CSS for aligning elements in the center */
    .container-lg {
      position: relative;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .small-elements {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .small-element {
      width: 100px;
      height: 100px;
      background-color: red;
    }

    /* CSS to push elements down when navbar is selected */
    .navbar-expanded ~ .container-lg {
      margin-top: 56px; /* Height of the expanded navbar */
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg d-md-none" id="navbar-little">
    <div class="container-fluid">
      <span class="material-symbols-outlined" id="navbar-small-icon">genetics</span>
      <a class="navbar-brand" id="navbar-small-main" href="./index.html">Woodson Scioly</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="material-symbols-outlined" id="toggler-icon">menu</span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link small-link" href="./team.html">The Team</a></li>
          <li class="nav-item"><a class="nav-link small-link" href="./leadership.html">Leadership</a></li>
          <li class="nav-item"><a class="nav-link small-link" href="./alumni.html">Alumni</a></li>
          <li class="nav-item"><a class="nav-link small-link" href="./resources.html">Resources</a></li>
          <li class="nav-item"><a class="nav-link small-link" href="./contact.html">Contact</a></li>
        </ul>
        <form class="d-flex" role="search">
        </form>
      </div>
    </div>
  </nav>

  <!-- Smaller elements to be centered -->
  <div class="small-elements">
    <div class="small-element"></div>
    <div class="small-element"></div>
  </div>

  <!-- Larger container element -->
  <div class="container-lg"></div>

  <script>
    // JavaScript to toggle the navbar-expanded class on navbar-toggler click
    document.addEventListener("DOMContentLoaded", function() {
      var navbarToggler = document.querySelector(".navbar-toggler");
      var navbar = document.querySelector(".navbar");

      navbarToggler.addEventListener("click", function() {
        navbar.classList.toggle("navbar-expanded");
      });
    });
  </script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous"></script>

</body>

</html>
